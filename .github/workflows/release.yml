name: Lint, Version & Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lua5.1 luarocks > /dev/null
          sudo luarocks install luacheck > /dev/null

      - name: Run Luacheck
        run: luacheck . --config .luacheckrc

  release:
    name: Version & Release
    needs: lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Get latest semver tag, default to 0.0.0 if none
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          # Strip 'v' prefix and split
          CURRENT="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Determine bump from commit messages since last tag
          COMMITS=$(git log "$LATEST"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:|BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Update TOC version
        run: |
          sed -i "s/^## Version: .*/## Version: ${{ steps.version.outputs.next }}/" GuildOS.toc

      - name: Update in-game version constant
        run: |
          sed -i -E "s/^(GuildOS\.VERSION[[:space:]]*=[[:space:]]*)\"[^\"]*\"/\1\"${{ steps.version.outputs.next }}\"/" Core/Config.lua

      - name: Generate changelog entry
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          DATE=$(date +%Y-%m-%d)
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          # Collect commits since last tag, grouped by type
          if [ -n "$LATEST" ]; then
            COMMITS=$(git log "$LATEST"..HEAD --pretty=format:"%s" 2>/dev/null)
          else
            COMMITS=$(git log --pretty=format:"%s")
          fi

          ADDED=""
          FIXED=""
          CHANGED=""
          OTHER=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            # Skip CI commits
            echo "$msg" | grep -qE "^\s*(chore: bump version|Merge)" && continue

            # Categorise by conventional commit prefix
            if echo "$msg" | grep -qiE "^feat(\(.+\))?[!]?:"; then
              line=$(echo "$msg" | sed -E 's/^[Ff]eat(\([^)]*\))?[!]?:\s*//')
              ADDED="${ADDED}\n- ${line}"
            elif echo "$msg" | grep -qiE "^fix(\(.+\))?:"; then
              line=$(echo "$msg" | sed -E 's/^[Ff]ix(\([^)]*\))?:\s*//')
              FIXED="${FIXED}\n- ${line}"
            elif echo "$msg" | grep -qiE "^(refactor|perf|style)(\(.+\))?:"; then
              line=$(echo "$msg" | sed -E 's/^[A-Za-z]+(\([^)]*\))?:\s*//')
              CHANGED="${CHANGED}\n- ${line}"
            else
              # Include non-chore/ci/docs commits as other changes
              echo "$msg" | grep -qiE "^(chore|ci|docs|test)(\(.+\))?:" && continue
              OTHER="${OTHER}\n- ${msg}"
            fi
          done <<< "$COMMITS"

          # Build the entry
          ENTRY="## [${VERSION}] - ${DATE}"
          [ -n "$ADDED" ]   && ENTRY="${ENTRY}\n\n### Added${ADDED}"
          [ -n "$FIXED" ]   && ENTRY="${ENTRY}\n\n### Fixed${FIXED}"
          [ -n "$CHANGED" ] && ENTRY="${ENTRY}\n\n### Changed${CHANGED}"
          [ -n "$OTHER" ]   && ENTRY="${ENTRY}\n\n### Other${OTHER}"

          # Prepend to CHANGELOG.md (after the header line)
          if [ -f CHANGELOG.md ]; then
            # Insert after the first two lines (title + blank line)
            head -n 3 CHANGELOG.md > CHANGELOG.tmp
            echo "" >> CHANGELOG.tmp
            echo -e "$ENTRY" >> CHANGELOG.tmp
            echo "" >> CHANGELOG.tmp
            tail -n +4 CHANGELOG.md >> CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            echo -e "# Guild OS Changelog\n\nAll notable changes to this project will be documented in this file.\n\n${ENTRY}" > CHANGELOG.md
          fi

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GuildOS.toc Core/Config.lua CHANGELOG.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump version to ${{ steps.version.outputs.next }} [skip ci]"
          git push origin main

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.version.outputs.next }}" -m "Release v${{ steps.version.outputs.next }}"
          git push origin "v${{ steps.version.outputs.next }}"

      - name: Trigger publish workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish.yml',
              ref: 'v${{ steps.version.outputs.next }}',
            });
